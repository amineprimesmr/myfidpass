<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Card Beam</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; min-height: 100vh; overflow: hidden; font-family: Arial, sans-serif; }
    .container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card-stream { position: absolute; width: 100vw; height: 420px; display: flex; align-items: center; overflow: visible; }
    .card-line { display: flex; align-items: center; gap: 60px; white-space: nowrap; cursor: grab; user-select: none; will-change: transform; }
    .card-line:active { cursor: grabbing; }
    .card-line.dragging { cursor: grabbing; }
    .card-wrapper { position: relative; width: 260px; height: 400px; flex-shrink: 0; }
    .card { position: absolute; top: 0; left: 0; width: 260px; height: 400px; border-radius: 16px; overflow: hidden; }
    .card-normal { background: transparent; box-shadow: 0 15px 40px rgba(0,0,0,0.4); z-index: 2; position: relative; overflow: hidden; clip-path: inset(0 0 0 var(--clip-right, 0%)); }
    .card-image { width: 100%; height: 100%; object-fit: cover; border-radius: 16px; filter: brightness(1.1) contrast(1.1); }
    .card-ascii { background: transparent; z-index: 1; position: absolute; top: 0; left: 0; width: 260px; height: 400px; border-radius: 16px; overflow: hidden; clip-path: inset(0 calc(100% - var(--clip-left, 0%)) 0 0); animation: glitch 0.1s infinite linear alternate-reverse; }
    .ascii-content { position: absolute; top: 0; left: 0; width: 100%; height: 100%; color: rgba(220,210,255,0.6); font-family: "Courier New", monospace; font-size: 11px; line-height: 13px; overflow: hidden; white-space: pre; margin: 0; padding: 0; }
    @keyframes glitch { 0% { opacity: 1; } 100% { opacity: 1; } }
    .scan-effect { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(0,255,255,0.4), transparent); animation: scanEffect 0.6s ease-out; pointer-events: none; z-index: 5; }
    @keyframes scanEffect { 0% { transform: translateX(-100%); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateX(100%); opacity: 0; } }
    #particleCanvas { position: absolute; top: 50%; left: 0; transform: translateY(-50%); width: 100vw; height: 420px; z-index: 0; pointer-events: none; }
    #scannerCanvas { position: absolute; top: 50%; left: -3px; transform: translateY(-50%); width: 100vw; height: 450px; z-index: 15; pointer-events: none; }
  </style>
</head>
<body>
  <span id="speedValue" style="position:absolute;opacity:0;pointer-events:none">120</span>
  <div class="container">
    <div id="cardStream" class="card-stream">
      <div id="cardLine" class="card-line"></div>
    </div>
    <canvas id="particleCanvas"></canvas>
    <canvas id="scannerCanvas"></canvas>
  </div>
  <script src="/card-beam-reversed.js"></script>
</body>
</html>
